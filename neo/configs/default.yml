# IPC服务配置
ipc:
  host: 127.0.0.1        # 绑定地址
  port: 9090             # 服务端口
  max_connections: 1000  # 最大连接数

# 连接池配置 (确保没有重复的pool配置块)
pool:
  initial_size: 6        # 初始连接数 (必须为整数且介于min_size和max_size之间)
  min_size: 5            # 最小空闲连接数
  max_size: 20           # 最大连接数
  idle_timeout: 60       # 空闲连接超时时间(秒)

http:
  host: 0.0.0.0
  port: 8000
  enable_https: false
  cert_file: ""
  key_file: ""

# 合并后的服务发现配置
discovery:
  storage: "memory"  # 使用内存存储模式（IPC服务发现）
  ttl: 10
  refresh_interval: 3
  service_prefix: "/services"
  service_key: "default_key"
  # 文件存储配置(当storage为file时生效)
  file_path: "/www/neo/neo/services.json"

# 新增协议配置
protocol:
  compression_type: "gzip"
  max_message_size: 1048576
  checksum_enabled: true

# 新增指标配置
metrics:
  enable_prometheus: true
  prometheus_port: 9092